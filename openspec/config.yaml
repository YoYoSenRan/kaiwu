schema: spec-driven

context: |
  # Kaiwu 项目上下文

  ## 项目简介
  Kaiwu 是一个多智能体协作系统，目标是让「一人公司」制度化运转。
  以中国古代三省六部制为骨架，以 OpenClaw 为群 Agent 协同底座。

  ## 技术栈
  - Monorepo: Turborepo + pnpm
  - 前端框架: Next.js 16 (App Router) + React 19
  - 语言: TypeScript 5（严格模式，禁止 any）
  - 样式: Tailwind CSS 4（只用 cn() 合并 className）
  - 代码规范: Oxlint + Oxfmt
  - 数据库: packages/db（Drizzle ORM）
  - 状态管理: Zustand（全局），React Server Component（页面级数据）

  ## 两个主要应用
  - apps/site: 官网，Server Component 为主，数据服务端获取
  - apps/console: 管理后台，混合 Server/Client Component

  ## 核心约束（生成 Spec 时必须遵守）
  - 数据变更优先 Server Action，而非 API Route
  - 所有外部输入必须用 zod 校验
  - page.tsx < 80 行，逻辑下沉 hooks/
  - 命名规范见 .claude/rules/code-names.md

  ## 提交规范
  使用 Conventional Commits：feat/fix/refactor/docs/chore

rules:
  proposal:
    - 必须包含 "Non-goals"（不做什么）章节
    - 说明对现有文件的影响范围
    - 明确技术方案选型理由
  tasks:
    - 每个 task 必须有明确的验收标准
    - 涉及数据库变更的 task 单独列出，排在最前
    - 每个 task 的粒度不超过 2 小时工作量
